# CONFIGURATION FILE FOR cycle_optimizer.py - power_curves.py 
# Reported values correspond to the current state of kitepower system June 2025

# Kite mass, area, and aerodynamic properties
kite:
  mass: 94                      # kg
  projected_area: 46.86         # m2
  drag_coefficient:
    powered: 0.17
    depowered: 0.08
  lift_coefficient:
    powered: 0.91
    depowered: 0.35

# Tether properties
tether:
  length: 360                   # m
  diameter: 0.014               # m
  density: 617.1314119889819    # kg/m3
  drag_coefficient: 1.1         # -

# Environment 
environment:
  profile: logarithmic
  roughness_length: 0.07
  ref_height: 100
  ref_windspeeds: [8, 10, 12]

# Bounds to the optimisation
bounds:
  avg_elevation: # Average elevation angle during reel out
    min: 30.                    # deg
    max: 60.                    # deg
  max_azimuth:  # Maximum azimuth angle during reel out (max flight cone width)
    min: 25.                    # deg
    max: 50.                    # deg
  relative_elevation: # Maximum elevation relative to the average elevation (max flight cone height)
    min: 8.                      # deg
    max: 12.                     # deg 
  force_limits: # Minimum force to have control on the kite 
    min: 300                    # kgf
    max: 2200                   # kgf
  speed_limits: # Should be both positive, so the full range is [-max, -min] U [min, max]
    min: 0.0                    # m/s
    max: 9.8                    # m/s
  tether_stroke:
    min: 75                     # m
    max: 150                    # m
  minimum_tether_length: # Tether length at start of reel-out
    min: 180                    # m
    max: 240                    # m

constraints:
  # Default constraints
  force_out_setpoint_min: 
    enabled: true
  force_in_setpoint_max:
    enabled: true
  ineq_cons_traction_max_force:
    enabled: true
  ineq_cons_min_tether_length:
    enabled: true
  ineq_cons_max_tether_length :
    enabled: true

  # Parametric constraints
  ineq_cons_cw_patterns:
    enabled: true
    min_patterns: 1 # Minimum number of crosswind patterns [-]
  ineq_cons_max_elevation:  
    enabled: true
    max_elevation: 100 # Maximum elevation angle [deg]
 
opt_variables:
  F_RO:
    enabled: true
    init_value: 1.1e+04 # kgf     
    unit: N
  F_RI:
    enabled: true
    init_value: 2.9418e+03 # kgf
    unit: N
  average_elevation:
    enabled: true
    init_value: 30. # deg
  relative_elevation:
    enabled: false
    init_value: 9.5 # deg
  maximum_azimuth:    
    enabled: false
    init_value: 25. # deg
  minimum_tether_length:
    enabled: true
    init_value: 195 # m
  tether_stroke:
    enabled: true 
    init_value: 120 # m

opt_settings:
  maxiter: 30
  iprint: 2 
  ftol: 1e-3
  eps: 1e-6

sim_settings:
  force_or_speed_control: 'force'
  time_step_RO: 0.25
  time_step_RI: 0.25
  time_step_RIRO: 0.25
